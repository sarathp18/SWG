<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <meta name="theme-color" content="#ffffff">
  <title>SWG Parallel Calculator</title>

  <style>
    /* Ithu browser-nte tap highlight (neela box) ozhivakkan vendiyullanu */
    * {
      -webkit-tap-highlight-color: transparent;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      background: #eef4fb; 
      margin: 0; 
      padding: 20px; 
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    
    /* Fixed Dimensions */
    .calculator { 
      width: 100%;
      max-width: 360px; 
      height: 520px; 
      background: #fff; 
      border-radius: 24px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
      position: relative;
      box-sizing: border-box;
      overflow: hidden;
    }

    /* Black Screen Container */
    .screen-container {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      height: 110px; 
      transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
      box-sizing: border-box;
      text-align: right;
    }

    #equation {
      height: 20px;
      color: #9e9e9e;
      font-size: 16px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
    }

    #main-display {
      color: #ffffff;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* Little Arrow Trigger */
    #expand-arrow {
      position: absolute;
      bottom: 10px;
      left: 16px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: none;
      padding: 5px;
      user-select: none;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Expanded Details Area (Text color is White) */
    #expanded-details {
      display: none;
      text-align: left;
      color: #ffffff; 
      font-size: 15px;
      line-height: 1.7;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed #444;
      opacity: 0;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* Expanded Mode */
    .expanded-mode .screen-container { 
      height: 400px; 
    }
    .expanded-mode #expand-arrow { 
      display: none !important; 
    }
    .expanded-mode #expanded-details { 
      display: block; 
      animation: fadeIn 0.3s ease-in 0.1s forwards; 
    }
    .expanded-mode .keypad-top { 
      opacity: 0; 
      pointer-events: none; 
      transform: translateY(20px); 
    }
    .expanded-mode .btn-action {
      background: #1976d2; 
    }

    /* Graph / Scale Design */
    .scale-container {
      margin-top: 25px;
      padding: 0 10px;
      position: relative;
    }
    .scale-line {
      width: 100%;
      height: 10px;
      border-bottom: 2px solid #a5d6a7;
      border-left: 2px solid #a5d6a7;
      border-right: 2px solid #a5d6a7;
      box-sizing: border-box;
    }
    .scale-marker {
      position: absolute;
      top: -12px;
      width: 0; 
      height: 0; 
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 12px solid #fff;
      transform: translateX(-50%);
    }
    .scale-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
    }

    /* Keypad Grid */
    .keypad-top { 
      position: absolute;
      top: 150px;
      left: 20px;
      right: 20px;
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 12px; 
      transition: opacity 0.2s, transform 0.3s;
      z-index: 1;
    }
    
    button {
      background: #f0f4f8; 
      border: none; 
      border-radius: 12px; 
      font-size: 24px;
      font-weight: 600; 
      color: #333; 
      height: 56px; 
      cursor: pointer; 
      user-select: none;
      transition: all 0.1s ease-in-out;
    }
    button:active { transform: scale(0.95); background: #333; color: #fff; }
    
    .btn-clear { background: #d32f2f; color: #ffffff; font-size: 18px; }
    .btn-clear:active { background: #b71c1c; }
    .btn-operator { background: #1976d2; color: #fff; font-size: 28px; }
    
    /* Bottom Action Button */
    .btn-action { 
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: #2e7d32; 
      color: #fff; 
      font-size: 20px; 
      text-transform: uppercase; 
      letter-spacing: 1px; 
      z-index: 3;
    }
    .btn-action:active { filter: brightness(0.8); }
  </style>
</head>
<body>

  <div class="calculator" id="calc-app">
    
    <div class="screen-container" id="screen">
      <div id="equation"></div>
      <div id="main-display">0</div>
      
      <div id="expand-arrow" onclick="expandScreen()">▼</div>
      
      <div id="expanded-details"></div>
    </div>

    <div class="keypad-top" id="keypad-top">
      <button onclick="press('1')">1</button>
      <button onclick="press('2')">2</button>
      <button onclick="press('3')">3</button>
      <button onclick="press('4')">4</button>
      <button onclick="press('5')">5</button>
      <button onclick="press('6')">6</button>
      <button onclick="press('7')">7</button>
      <button onclick="press('8')">8</button>
      <button onclick="press('9')">9</button>
      <button onclick="press('C')" class="btn-clear">CLEAR</button>
      <button onclick="press('0')">0</button>
      <button onclick="press('+')" class="btn-operator">+</button>
    </div>

    <button id="action-btn" class="btn-action" onclick="press('=')">CALCULATE</button>
  </div>

  <script>
    const MILS = {
      1: 300, 2: 276, 3: 252, 4: 232, 5: 212, 6: 192, 7: 176, 8: 160, 9: 144, 10: 128,
      11: 116, 12: 104, 13: 92, 14: 80, 15: 72, 16: 64, 17: 56, 18: 48, 19: 40, 20: 36,
      21: 32, 22: 28, 23: 24, 24: 22, 25: 20, 26: 18, 27: 16.4, 28: 14.8, 29: 13.6, 30: 12.4,
      31: 11.6, 32: 10.8, 33: 10.0, 34: 9.2, 35: 8.4, 36: 7.6, 37: 6.8, 38: 6.0, 39: 5.2, 40: 4.8,
      41: 4.4, 42: 4.0, 43: 3.6, 44: 3.2, 45: 2.8, 46: 2.4, 47: 2.0, 48: 1.6, 49: 1.2, 50: 1.0
    };

    let currentNum = "";
    let gauges = [];
    let justCalculated = false;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const eqDisplay = document.getElementById('equation');
    const mainDisplay = document.getElementById('main-display');
    const arrowIcon = document.getElementById('expand-arrow');
    const actionBtn = document.getElementById('action-btn');

    function playClickSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const oscGain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.02);
      oscGain.gain.setValueAtTime(1, audioCtx.currentTime);
      oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.02);
      osc.connect(oscGain);
      oscGain.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.03);
    }

    function vibratePhone() {
      if (navigator.vibrate) navigator.vibrate(40); 
    }

    function updateScreen() {
      let eqString = gauges.join(" + ");
      if (gauges.length > 0 && currentNum === "") eqString += " + ";
      eqDisplay.innerText = eqString;
      if (!justCalculated) mainDisplay.innerText = currentNum || "0";
    }

    function expandScreen() {
      vibratePhone();
      document.getElementById('calc-app').classList.add('expanded-mode');
      actionBtn.innerText = "CLOSE";
      actionBtn.onclick = closeScreen;
    }

    function closeScreen() {
      vibratePhone();
      document.getElementById('calc-app').classList.remove('expanded-mode');
      actionBtn.innerText = "CALCULATE";
      actionBtn.onclick = () => press('=');
      if (justCalculated && mainDisplay.innerText !== "Error") {
        arrowIcon.style.display = 'block';
      }
    }

    function press(val) {
      vibratePhone();
      playClickSound();
      
      closeScreen(); 

      if (justCalculated && val !== '=' && val !== '+') {
        gauges = []; currentNum = ""; justCalculated = false; arrowIcon.style.display = 'none';
      }

      if (val === 'C') {
        currentNum = ""; gauges = []; justCalculated = false; arrowIcon.style.display = 'none';
        updateScreen(); return;
      }

      if (val === '+') {
        if (currentNum !== "") { gauges.push(parseInt(currentNum)); currentNum = ""; }
        justCalculated = false; arrowIcon.style.display = 'none';
        updateScreen(); return;
      }

      if (val === '=') {
        if (currentNum !== "") { gauges.push(parseInt(currentNum)); currentNum = ""; }
        updateScreen();
        if (gauges.length > 0) calculateResults();
        return;
      }

      if (currentNum.length < 2) { currentNum += val; updateScreen(); }
    }

    function calculateResults() {
      let sumSqMils = 0;
      let hasError = false;
      let errorMsg = "";

      for (let g of gauges) {
        if (!MILS[g]) {
          hasError = true;
          errorMsg = `SWG ${g} unsupported (1-50)`;
          break;
        }
        sumSqMils += (MILS[g] * MILS[g]);
      }

      if (hasError) {
        mainDisplay.innerText = "Error";
        eqDisplay.innerText = errorMsg;
        arrowIcon.style.display = 'none';
        justCalculated = true;
        return;
      }

      let de_mils = Math.sqrt(sumSqMils);
      let de_mm = de_mils * 0.0254;
      let area_mm2 = Math.PI * (de_mm * de_mm) / 4;
      
      if (de_mils > MILS[1]) {
        mainDisplay.innerText = "Error";
        eqDisplay.innerText = "Thicker than SWG 1";
        arrowIcon.style.display = 'none';
        justCalculated = true;
        return;
      }
      if (de_mils < MILS[50]) {
        mainDisplay.innerText = "Error";
        eqDisplay.innerText = "Thinner than SWG 50";
        arrowIcon.style.display = 'none';
        justCalculated = true;
        return;
      }

      let dec = 0;
      for (let g = 1; g < 50; g++) {
        if (de_mils <= MILS[g] && de_mils >= MILS[g+1]) {
          let area_upper = MILS[g] * MILS[g];
          let area_lower = MILS[g+1] * MILS[g+1];
          let fraction = (area_upper - sumSqMils) / (area_upper - area_lower);
          dec = g + fraction;
          break;
        }
      }

      let formattedDec = dec.toFixed(4);
      let shortDec = dec.toFixed(2); // 2 digit version for main display
      let near = Math.round(dec);

      let lower = Math.floor(dec);
      let upper = Math.ceil(dec);
      if (lower === upper) upper = lower + 1;
      let progress = (dec - lower) * 100;

      document.getElementById('expanded-details').innerHTML = `
        <div>Equivalent swg : ${formattedDec}</div>
        <div>Diameter : ${de_mm.toFixed(3)} mm</div>
        <div>Area : ${area_mm2.toFixed(3)} mm²</div>
        <div>Nearest standard SWG : ${near}</div>
        
        <div class="scale-container">
          <div class="scale-marker" style="left: ${progress}%;"></div>
          <div class="scale-line"></div>
          <div class="scale-labels">
            <span>${lower}</span>
            <span>${upper}</span>
          </div>
        </div>
      `;

      // Big text shows 2 digits
      mainDisplay.innerText = shortDec; 
      arrowIcon.style.display = 'block'; 
      justCalculated = true;
    }
  </script>
</body>
</html>
