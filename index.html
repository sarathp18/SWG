<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <meta name="theme-color" content="#ffffff">

  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      background: #eef4fb; 
      margin: 0; 
      padding: 20px; 
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    
    .calculator { 
      width: 100%;
      max-width: 360px; 
      background: #fff; 
      border-radius: 24px; 
      padding: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
    }

    /* Calculator Screen */
    .screen-container {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      text-align: right;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.3);
      position: relative;
    }

    #equation {
      min-height: 20px;
      color: #9e9e9e;
      font-size: 16px;
      margin-bottom: 4px;
      word-wrap: break-word;
    }

    #main-display {
      color: #ffffff;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 1px;
      min-height: 42px;
      word-wrap: break-word;
    }

    /* Results Dropdown */
    #results {
      display: none; 
      background: #e8f5e9; 
      border-left: 5px solid #2e7d32; 
      border-radius: 8px; 
      padding: 12px;
      margin-bottom: 20px;
      font-size: 15px;
      line-height: 1.6;
      color: #1b5e20;
      text-align: left;
    }

    /* Keypad Grid */
    .keypad { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 12px; 
    }
    
    button {
      background: #f0f4f8;
      border: none;
      border-radius: 12px;
      font-size: 24px;
      font-weight: 600;
      color: #333;
      padding: 16px 0;
      cursor: pointer;
      user-select: none;
      transition: all 0.1s ease-in-out;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    button:active {
      transform: scale(0.95);
      background: #e1e7ed;
    }

    /* Clear Button Styles */
    .btn-clear { 
      background: #d32f2f; 
      color: #ffffff; 
    }
    .btn-clear:active { 
      background: #b71c1c; 
    }
    
    .btn-operator { 
      background: #1976d2; 
      color: #fff; 
      font-size: 28px;
    }
    .btn-operator:active { background: #1565c0; }

    .btn-equals {
      grid-column: span 3;
      background: #2e7d32;
      color: #fff;
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-equals:active { background: #1b5e20; }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="screen-container">
      <div id="equation"></div>
      <div id="main-display">0</div>
    </div>

    <div id="results"></div>

    <div class="keypad">
      <button onclick="press('1')">1</button>
      <button onclick="press('2')">2</button>
      <button onclick="press('3')">3</button>
      
      <button onclick="press('4')">4</button>
      <button onclick="press('5')">5</button>
      <button onclick="press('6')">6</button>
      
      <button onclick="press('7')">7</button>
      <button onclick="press('8')">8</button>
      <button onclick="press('9')">9</button>
      
      <button onclick="press('C')" class="btn-clear">CLEAR</button>
      <button onclick="press('0')">0</button>
      <button onclick="press('+')" class="btn-operator">+</button>
      
      <button onclick="press('=')" class="btn-equals"> Calculate</button>
    </div>
  </div>

  <script>
    const D = {
      1: 7.620, 2: 7.010, 3: 6.401, 4: 5.893, 5: 5.385, 6: 4.877, 7: 4.470, 8: 4.064, 9: 3.658, 10: 3.251,
      11: 2.946, 12: 2.642, 13: 2.337, 14: 2.032, 15: 1.829, 16: 1.626, 17: 1.422, 18: 1.219, 19: 1.016,
      20: 0.914, 21: 0.813, 22: 0.711, 23: 0.610, 24: 0.559, 25: 0.508, 26: 0.457, 27: 0.417, 28: 0.376, 29: 0.345,
      30: 0.315, 31: 0.295, 32: 0.274, 33: 0.254, 34: 0.234, 35: 0.213, 36: 0.193, 37: 0.173, 38: 0.152, 39: 0.132, 40: 0.122
    };

    let currentNum = "";
    let gauges = [];
    let justCalculated = false;

    const eqDisplay = document.getElementById('equation');
    const mainDisplay = document.getElementById('main-display');
    const resDiv = document.getElementById('results');

    // Initialize Web Audio API context
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playClickSound() {
      // Browsers require interaction to resume audio context
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      // Generate a tiny fraction of a second of white noise
      const bufferSize = audioCtx.sampleRate * 0.05; // 50 milliseconds
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1; 
      }
      
      const noiseSource = audioCtx.createBufferSource();
      noiseSource.buffer = buffer;
      
      // Run the noise through a low-pass filter to muffle it into a "thock/clack"
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 800; // Lower numbers sound deeper, higher is clickier
      
      // Quickly fade out the sound so it snaps off sharply
      const gainNode = audioCtx.createGain();
      gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
      
      // Connect the pieces and play
      noiseSource.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      noiseSource.start(audioCtx.currentTime);
    }

    function vibratePhone() {
      if (navigator.vibrate) {
        navigator.vibrate(50); // Vibrate for 50 milliseconds
      }
    }

    function updateScreen() {
      let eqString = gauges.join(" + ");
      if (gauges.length > 0 && currentNum === "") {
        eqString += " + ";
      }
      eqDisplay.innerText = eqString;
      
      if (!justCalculated) {
        mainDisplay.innerText = currentNum || "0";
      }
    }

    function press(val) {
      // Trigger haptic feedback and the click sound
      vibratePhone();
      playClickSound();

      if (justCalculated && val !== '=' && val !== '+') {
        gauges = [];
        currentNum = "";
        justCalculated = false;
        resDiv.style.display = 'none';
      }

      if (!justCalculated) {
        resDiv.style.display = 'none';
      }

      if (val === 'C') {
        currentNum = "";
        gauges = [];
        justCalculated = false;
        resDiv.style.display = 'none';
        updateScreen();
        return;
      }

      if (val === '+') {
        if (currentNum !== "") {
          gauges.push(parseInt(currentNum));
          currentNum = "";
        }
        justCalculated = false;
        updateScreen();
        return;
      }

      if (val === '=') {
        if (currentNum !== "") {
          gauges.push(parseInt(currentNum));
          currentNum = "";
        }
        
        justCalculated = false; 
        updateScreen();
        
        if (gauges.length > 0) {
          calculateResults();
        }
        return;
      }

      if (currentNum.length < 2) {
        currentNum += val;
        updateScreen();
      }
    }

    function calculateResults() {
      let sum = 0;
      
      for (let g of gauges) {
        if (!D[g]) {
          mainDisplay.innerText = "Error";
          resDiv.innerHTML = `<b style="color:#d32f2f;">Error: SWG ${g} is unsupported. Use 1-40.</b>`;
          resDiv.style.display = 'block';
          justCalculated = true;
          return;
        }
        sum += D[g] * D[g];
      }

      let de = Math.sqrt(sum);
      let area = Math.PI * de * de / 4;
      let dec = 'Out of range';
      
      for (let g = 1; g < 40; g++) {
        if (de <= D[g] && de >= D[g+1]) {
          dec = (g + (D[g] - de) / (D[g] - D[g+1])).toFixed(2);
          break;
        }
      }
      
      if (de > D[1]) {
        dec = 'Thicker than SWG 1';
      }

      let near = (dec === 'Out of range' || dec === 'Thicker than SWG 1') ? 'N/A' : Math.round(parseFloat(dec));
      
      resDiv.innerHTML = `
        <b>Equivalent SWG:</b> ${dec}<br>
        <b>Diameter:</b> ${de.toFixed(3)} mm<br>
        <b>Area:</b> ${area.toFixed(3)} mm²<br>
        <b>Nearest Standard SWG:</b> ${near}
      `;
      resDiv.style.display = 'block';
      
      mainDisplay.innerText = dec;
      
      justCalculated = true;
    }
  </script>
</body>
</html>
