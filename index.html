<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <meta name="theme-color" content="#ffffff">

  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      background: #eef4fb; 
      margin: 0; 
      padding: 20px; 
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    
    .calculator { 
      width: 100%;
      max-width: 360px; 
      background: #fff; 
      border-radius: 24px; 
      padding: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
    }

    /* Calculator Screen */
    .screen-container {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      text-align: right;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.3);
      position: relative;
    }

    #equation {
      min-height: 20px;
      color: #9e9e9e;
      font-size: 16px;
      margin-bottom: 4px;
      word-wrap: break-word;
    }

    #main-display {
      color: #ffffff;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 1px;
      min-height: 42px;
      word-wrap: break-word;
    }

    /* Results Dropdown */
    #results {
      display: none; 
      background: #e8f5e9; 
      border-left: 5px solid #2e7d32; 
      border-radius: 8px; 
      padding: 12px;
      margin-bottom: 20px;
      font-size: 15px;
      line-height: 1.6;
      color: #1b5e20;
      text-align: left;
    }

    /* Keypad Grid */
    .keypad { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 12px; 
    }
    
    button {
      background: #f0f4f8;
      border: none;
      border-radius: 12px;
      font-size: 24px;
      font-weight: 600;
      color: #333;
      padding: 16px 0;
      cursor: pointer;
      user-select: none;
      transition: all 0.1s ease-in-out;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    /* Invert Number Buttons and Shrink on Press */
    button:active {
      transform: scale(0.95);
      background: #333; 
      color: #fff;      
    }

    /* Clear Button Styles */
    .btn-clear { 
      background: #d32f2f; 
      color: #ffffff; 
    }
    .btn-clear:active { 
      background: #b71c1c; 
    }
    
    /* Operator Button Styles */
    .btn-operator { 
      background: #1976d2; 
      color: #fff; 
      font-size: 28px;
    }
    .btn-operator:active { 
      background: #1565c0; 
    }

    /* Equals Button Styles */
    .btn-equals {
      grid-column: span 3;
      background: #2e7d32;
      color: #fff;
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-equals:active { 
      background: #1b5e20; 
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="screen-container">
      <div id="equation"></div>
      <div id="main-display">0</div>
    </div>

    <div id="results"></div>

    <div class="keypad">
      <button onclick="press('1')">1</button>
      <button onclick="press('2')">2</button>
      <button onclick="press('3')">3</button>
      
      <button onclick="press('4')">4</button>
      <button onclick="press('5')">5</button>
      <button onclick="press('6')">6</button>
      
      <button onclick="press('7')">7</button>
      <button onclick="press('8')">8</button>
      <button onclick="press('9')">9</button>
      
      <button onclick="press('C')" class="btn-clear">CLEAR</button>
      <button onclick="press('0')">0</button>
      <button onclick="press('+')" class="btn-operator">+</button>
      
      <button onclick="press('=')" class="btn-equals"> Calculate</button>
    </div>
  </div>

  <script>
    // UPGRADED MATH ENGINE: Stores the exact, historically perfect integer values in "mils" to prevent rounding errors
    const MILS = {
      1: 300, 2: 276, 3: 252, 4: 232, 5: 212, 6: 192, 7: 176, 8: 160, 9: 144, 10: 128,
      11: 116, 12: 104, 13: 92, 14: 80, 15: 72, 16: 64, 17: 56, 18: 48, 19: 40, 20: 36,
      21: 32, 22: 28, 23: 24, 24: 22, 25: 20, 26: 18, 27: 16.4, 28: 14.8, 29: 13.6, 30: 12.4,
      31: 11.6, 32: 10.8, 33: 10.0, 34: 9.2, 35: 8.4, 36: 7.6, 37: 6.8, 38: 6.0, 39: 5.2, 40: 4.8
    };

    let currentNum = "";
    let gauges = [];
    let justCalculated = false;

    // Initialize Web Audio API context
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const eqDisplay = document.getElementById('equation');
    const mainDisplay = document.getElementById('main-display');
    const resDiv = document.getElementById('results');

    function playClickSound() {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      const osc = audioCtx.createOscillator();
      const oscGain = audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.02);
      
      oscGain.gain.setValueAtTime(1, audioCtx.currentTime);
      oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.02);
      
      osc.connect(oscGain);
      oscGain.connect(audioCtx.destination);
      
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.03);

      const bufferSize = audioCtx.sampleRate * 0.02; 
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1; 
      }
      
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'highpass';
      noiseFilter.frequency.value = 1000;
      
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.015);
      
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      
      noise.start(audioCtx.currentTime);
    }

    function vibratePhone() {
      if (navigator.vibrate) {
        navigator.vibrate(40); 
      }
    }

    function updateScreen() {
      let eqString = gauges.join(" + ");
      if (gauges.length > 0 && currentNum === "") {
        eqString += " + ";
      }
      eqDisplay.innerText = eqString;
      
      if (!justCalculated) {
        mainDisplay.innerText = currentNum || "0";
      }
    }

    function press(val) {
      vibratePhone();
      playClickSound();

      if (justCalculated && val !== '=' && val !== '+') {
        gauges = [];
        currentNum = "";
        justCalculated = false;
        resDiv.style.display = 'none';
      }

      if (!justCalculated) {
        resDiv.style.display = 'none';
      }

      if (val === 'C') {
        currentNum = "";
        gauges = [];
        justCalculated = false;
        resDiv.style.display = 'none';
        updateScreen();
        return;
      }

      if (val === '+') {
        if (currentNum !== "") {
          gauges.push(parseInt(currentNum));
          currentNum = "";
        }
        justCalculated = false;
        updateScreen();
        return;
      }

      if (val === '=') {
        if (currentNum !== "") {
          gauges.push(parseInt(currentNum));
          currentNum = "";
        }
        
        justCalculated = false; 
        updateScreen();
        
        if (gauges.length > 0) {
          calculateResults();
        }
        return;
      }

      if (currentNum.length < 2) {
        currentNum += val;
        updateScreen();
      }
    }

    function calculateResults() {
      let sumSqMils = 0;
      
      // Math Step 1: Calculate total squared mils for perfect integer accuracy
      for (let g of gauges) {
        if (!MILS[g]) {
          mainDisplay.innerText = "Error";
          resDiv.innerHTML = `<b style="color:#d32f2f;">Error: SWG ${g} is unsupported. Use 1-40.</b>`;
          resDiv.style.display = 'block';
          justCalculated = true;
          return;
        }
        let dMil = MILS[g];
        sumSqMils += (dMil * dMil);
      }

      // Math Step 2: Extract real-world values using final conversions
      let de_mils = Math.sqrt(sumSqMils);
      let de_mm = de_mils * 0.0254; // Convert exact mils to millimeters
      let area_mm2 = Math.PI * (de_mm * de_mm) / 4;
      let dec = 'Out of range';
      
      // Math Step 3: Interpolate fractional gauge based on perfect Area tracking
      for (let g = 1; g < 40; g++) {
        if (de_mils <= MILS[g] && de_mils >= MILS[g+1]) {
          let area_upper = MILS[g] * MILS[g];
          let area_lower = MILS[g+1] * MILS[g+1];
          let fraction = (area_upper - sumSqMils) / (area_upper - area_lower);
          dec = (g + fraction).toFixed(2);
          break;
        }
      }
      
      if (de_mils > MILS[1]) {
        dec = 'Thicker than SWG 1';
      }

      let near = (dec === 'Out of range' || dec === 'Thicker than SWG 1') ? 'N/A' : Math.round(parseFloat(dec));
      
      resDiv.innerHTML = `
        <b>Equivalent SWG:</b> ${dec}<br>
        <b>Diameter:</b> ${de_mm.toFixed(3)} mm<br>
        <b>Area:</b> ${area_mm2.toFixed(3)} mm²<br>
        <b>Nearest Standard SWG:</b> ${near}
      `;
      resDiv.style.display = 'block';
      
      mainDisplay.innerText = dec;
      justCalculated = true;
    }
  </script>
</body>
</html>
