<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <meta name="theme-color" content="#ffffff">

  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      background: #eef4fb; 
      margin: 0; 
      padding: 20px; 
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    
    .calculator { 
      width: 100%;
      max-width: 360px; 
      background: #fff; 
      border-radius: 24px; 
      padding: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
    }

    /* Calculator Screen */
    .screen-container {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      text-align: right;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.3);
      position: relative;
    }

    #equation {
      min-height: 20px;
      color: #9e9e9e;
      font-size: 16px;
      margin-bottom: 4px;
      word-wrap: break-word;
    }

    #main-display {
      color: #ffffff;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 1px;
      min-height: 42px;
      word-wrap: break-word;
    }

    /* Results Dropdown */
    #results {
      display: none; 
      background: #e8f5e9; 
      border-left: 5px solid #2e7d32; 
      border-radius: 8px; 
      padding: 12px;
      margin-bottom: 20px;
      font-size: 15px;
      line-height: 1.6;
      color: #1b5e20;
      text-align: left;
    }

    /* Keypad Grid */
    .keypad { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 12px; 
    }
    
    button {
      background: #f0f4f8;
      border: none;
      border-radius: 12px;
      font-size: 24px;
      font-weight: 600;
      color: #333;
      padding: 16px 0;
      cursor: pointer;
      user-select: none;
      transition: all 0.1s ease-in-out;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    button:active {
      transform: scale(0.95);
      background: #e1e7ed;
    }

    /* Clear Button Styles */
    .btn-clear { 
      background: #d32f2f; 
      color: #ffffff; 
    }
    .btn-clear:active { 
      background: #b71c1c; 
    }
    
    .btn-operator { 
      background: #1976d2; 
      color: #fff; 
      font-size: 28px;
    }
    .btn-operator:active { background: #1565c0; }

    .btn-equals {
      grid-column: span 3;
      background: #2e7d32;
      color: #fff;
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-equals:active { background: #1b5e20; }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="screen-container">
      <div id="equation"></div>
      <div id="main-display">0</div>
    </div>

    <div id="results"></div>

    <div class="keypad">
      <button onclick="press('1')">1</button>
      <button onclick="press('2')">2</button>
      <button onclick="press('3')">3</button>
      
      <button onclick="press('4')">4</button>
      <button onclick="press('5')">5</button>
      <button onclick="press('6')">6</button>
      
      <button onclick="press('7')">7</button>
      <button onclick="press('8')">8</button>
      <button onclick="press('9')">9</button>
      
      <button onclick="press('C')" class="btn-clear">CLEAR</button>
      <button onclick="press('0')">0</button>
      <button onclick="press('+')" class="btn-operator">+</button>
      
      <button onclick="press('=')" class="btn-equals"> Calculate</button>
    </div>
  </div>
